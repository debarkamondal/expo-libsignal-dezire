name: Publish to npm

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # Crucial: Initialize the libsignal-dezire submodule

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim, aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install JS dependencies
        run: bun install

      - name: Build Native Android & iOS Libraries
        run: bun run build:all
        env:
          # GitHub Actions macos runners have the NDK pre-installed here
          ANDROID_NDK_HOME: /Users/runner/Library/Android/sdk/ndk/25.2.9519653

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
